<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elegant Dropdown Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Smooth transitions */
        .nav-link, .dropdown-content {
            transition: all 0.2s ease-in-out;
        }
        
        /* Dropdown animation */
        .dropdown-content {
            transform: translateY(10px);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease-in-out;
        }
        
        .group:hover .dropdown-content {
            transform: translateY(0);
            opacity: 1;
            visibility: visible;
        }

        /* Chevron rotation */
        .group:hover .chevron-down {
            transform: rotate(180deg);
        }
        
        .chevron-down {
            transition: transform 0.2s ease-in-out;
        }

        /* Mobile menu animation */
        .mobile-menu {
            transition: max-height 0.3s ease-in-out;
        }
    </style>
</head>
<body>
    <body>
        <div class="header" include="../dist/modules/header.htm"></div>
        
        <!-- The main container of the page-->
        <main class="max-w-screen-xl mx-auto px-4">
            <!-- dummy section-->
            <section class="py-5">
                This is dummy content
            </section>
        </main>


        <div class="footer" include="../dist/modules/footer.htm"></div>
        <script src="../dist/js/modules.js"></script>
    </body>
</body>
</html>
